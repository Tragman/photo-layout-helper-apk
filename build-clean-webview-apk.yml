                };
                els.photoContent.appendChild(img);
              }
          
              async function renderGalleryPage() {
                revokeUrls('gallery');
                els.galleryStrip.textContent = '';
                if (!state.galleryImageIds.length) {
                  const placeholder = document.createElement('div');
                  placeholder.className = 'gallery-placeholder';
                  placeholder.textContent = 'Upload gallery photos in Creative mode.';
                  els.galleryStrip.appendChild(placeholder);
                  return;
                }
                let count = 0;
                for (const id of state.galleryImageIds) {
                  const blob = await getImage(id);
                  if (!blob) continue;
                  const url = URL.createObjectURL(blob);
                  objectUrls.gallery.push(url);
                  const slide = document.createElement('div');
                  slide.className = 'gallery-slide';
                  const img = document.createElement('img');
                  img.alt = '';
                  img.style.objectFit = state.imageSizing.galleryFit;
                  img.src = url;
                  img.onerror = () => slide.remove();
                  slide.appendChild(img);
                  els.galleryStrip.appendChild(slide);
                  count++;
                }
                if (!count) {
                  const placeholder = document.createElement('div');
                  placeholder.className = 'gallery-placeholder';
                  placeholder.textContent = 'The saved gallery photos could not be loaded.';
                  els.galleryStrip.appendChild(placeholder);
                }
              }
          
              function getAllRenderableButtons() {
                const base = [
                  { id: 'button1', label: 'Button one', data: state.buttons.button1 },
                  { id: 'button2', label: 'Button two', data: state.buttons.button2 },
                  { id: 'account', label: 'Account button', data: state.buttons.account }
                ];
                state.buttons.clones.forEach((clone, index) => {
                  base.push({ id: `clone-${index}`, label: `Button two clone ${index + 1}`, data: clone });
                });
                return base;
              }
          
              function getButtonData(id) {
                if (id === 'button1') return state.buttons.button1;
                if (id === 'button2') return state.buttons.button2;
                if (id === 'account') return state.buttons.account;
                if (id.startsWith('clone-')) {
                  const index = Number(id.slice(6));
                  return state.buttons.clones[index] || null;
                }
                return null;
              }
          
              function renderedTop(button) {
                return button.locked ? button.y : button.y - mainScrollY();
              }
          
              function getButtonRectFromDom(id) {
                const el = els.overlayLayer.querySelector(`[data-button-id="${CSS.escape(id)}"]`);
                return el ? el.getBoundingClientRect() : null;
              }
          
              function createButtonElement(id) {
                const div = document.createElement('div');
                div.className = 'tap-button';
                div.dataset.buttonId = id;
                div.setAttribute('role', 'button');
                const text = document.createElement('span');
                text.className = 'button-text';
                const handle = document.createElement('span');
                handle.className = 'resize-handle';
                handle.dataset.resizeHandle = '1';
                div.appendChild(text);
                div.appendChild(handle);
                els.overlayLayer.appendChild(div);
                buttonElements.set(id, div);
                return div;
              }
          
              function renderButtonsNow() {
                renderQueued = false;
                if (currentPage !== 'main') return;
          
                const alive = new Set();
                for (const item of getAllRenderableButtons()) {
                  const b = item.data;
                  alive.add(item.id);
                  const div = buttonElements.get(item.id) || createButtonElement(item.id);
                  div.className = 'tap-button' + (b.transparent ? ' transparent-normal' : '');
                  div.setAttribute('aria-label', item.label);
                  div.style.transform = `translate3d(${Math.round(b.x)}px, ${Math.round(renderedTop(b))}px, 0)`;
                  div.style.width = `${Math.round(b.width)}px`;
                  div.style.height = `${Math.round(b.height)}px`;
                  div.style.borderRadius = `${Math.round(b.radius)}px`;
                  div.style.background = b.transparent ? 'transparent' : b.color;
                  const text = div.querySelector('.button-text');
                  if (text && text.textContent !== (b.text || '')) text.textContent = b.text || '';
                }
          
                for (const [id, el] of buttonElements.entries()) {
                  if (!alive.has(id)) {
                    el.remove();
                    buttonElements.delete(id);
                  }
                }
              }
          
              function scheduleButtonRender() {
                if (renderQueued) return;
                renderQueued = true;
                requestAnimationFrame(renderButtonsNow);
              }
          
              function runScrollRenderLoop() {
                scrollLoopRaf = 0;
                renderButtonsNow();
                applyBottomOverlaySizingStyles();
                if (performance.now() < scrollLoopUntil) {
                  scrollLoopRaf = requestAnimationFrame(runScrollRenderLoop);
                }
              }
          
              function startScrollRenderLoop() {
                scrollLoopUntil = performance.now() + 260;
                if (!scrollLoopRaf) scrollLoopRaf = requestAnimationFrame(runScrollRenderLoop);
              }
          
              function setBodyMode(page) {
                els.body.classList.toggle('main-mode', page === 'main');
                els.body.classList.toggle('photo-mode', page === 'photo');
                els.body.classList.toggle('gallery-mode', page === 'gallery');
                els.body.classList.toggle('account-mode', page === 'account');
              }
          
              function updatePageVisibility() {
                const pages = {
                  main: els.mainPage,
                  photo: els.photoPage,
                  gallery: els.galleryPage,
                  account: els.accountPage
                };
                Object.entries(pages).forEach(([name, el]) => el.classList.toggle('active', name === currentPage));
                setBodyMode(currentPage);
                if (currentPage !== 'main') closeEditor(false, true);
                renderBottomOverlayEditFrame();
                scheduleButtonRender();
              }
          
              function pushHistory(page, editorOpen = false) {
                try {
                  history.pushState({ page, editorOpen }, '', page === 'main' ? '#main' : `#${page}`);
                } catch (_) {}
              }
          
              function replaceHistory(page, editorOpen = false) {
                try {
                  history.replaceState({ page, editorOpen }, '', page === 'main' ? '#main' : `#${page}`);
                } catch (_) {}
              }
          
              async function showPage(page, push = true) {
                currentPage = page;
                if (push) pushHistory(page, false);
                updatePageVisibility();
                if (page === 'photo') await renderPhotoPage();
                if (page === 'gallery') await renderGalleryPage();
                if (page === 'account') renderAccountPage();
              }
          
              function goMain(push = true) {
                currentPage = 'main';
                if (push) pushHistory('main', false);
                updatePageVisibility();
              }
          
              function backToMain() {
                if (currentPage === 'main') return;
                if (history.length > 1) {
                  history.back();
                } else {
                  goMain(false);
                }
              }
          
              function renderAccountPage() {
                els.profileTitle.textContent = state.account.title || 'Personal';
                els.profileEmail.textContent = state.account.email || 'jtavaglione@hotmail.co.uk';
              }
          
              function openEditor(push = true) {
                if (currentPage !== 'main') return;
                state.editor.open = true;
                els.body.classList.add('editing');
                els.editorPanel.classList.toggle('collapsed', !!state.editor.collapsed);
                syncControlsFromState();
                renderBottomOverlayEditFrame();
                scheduleButtonRender();
                saveState();
                if (push) pushHistory('main', true);
              }
          
              function closeEditor(save = true, noHistory = false) {
                state.editor.open = false;
                cancelColorSample();
                els.body.classList.remove('editing');
                dragState = null;
                renderBottomOverlayEditFrame();
                scheduleButtonRender();
                if (save) saveState();
                if (!noHistory && currentPage === 'main') replaceHistory('main', false);
              }
          
              function togglePanelCollapsed() {
                state.editor.collapsed = !state.editor.collapsed;
                els.editorPanel.classList.toggle('collapsed', state.editor.collapsed);
                document.getElementById('collapsePanelBtn').textContent = state.editor.collapsed ? 'Expand' : 'Collapse';
                saveState();
              }
          
              function setButtonLock(id, locked) {
                const b = getButtonData(id);
                if (!b) return;
                const currentlyLocked = !!b.locked;
                if (locked && !currentlyLocked) {
                  const rect = getButtonRectFromDom(id);
                  b.x = rect ? rect.left : b.x;
                  b.y = rect ? rect.top : (b.y - mainScrollY());
                  b.locked = true;
                } else if (!locked && currentlyLocked) {
                  b.y = b.y + mainScrollY();
                  b.locked = false;
                }
                saveState();
                syncControlsFromState();
                scheduleButtonRender();
              }
          
              function lockExactlyNow(id) {
                const b = getButtonData(id);
                if (!b) return;
                const rect = getButtonRectFromDom(id);
                if (rect) {
                  b.x = rect.left;
                  b.y = rect.top;
                } else if (!b.locked) {
                  b.y = b.y - mainScrollY();
                }
                b.locked = true;
                saveState();
                syncControlsFromState();
                scheduleButtonRender();
              }
          
              function cloneButtonTwoHere() {
                const source = state.buttons.button2;
                const rect = getButtonRectFromDom('button2');
                const clone = Object.assign({}, source, {
                  x: rect ? rect.left : source.x,
                  y: rect ? rect.top : renderedTop(source),
                  locked: true,
                  action: 'gallery'
                });
                state.buttons.clones.push(clone);
                saveState();
                scheduleButtonRender();
              }
          
              function buttonAction(button) {
                if (!button || state.editor.open || currentPage !== 'main') return;
                if (button.action === 'photo') showPage('photo', true);
                if (button.action === 'gallery') showPage('gallery', true);
                if (button.action === 'account') showPage('account', true);
              }
          
              function onOverlayPointerDown(event) {
                const buttonEl = event.target.closest('.tap-button');
                if (!buttonEl) return;
                const id = buttonEl.dataset.buttonId;
                const b = getButtonData(id);
                if (!b) return;
          
                if (!state.editor.open) return;
          
                event.preventDefault();
                event.stopPropagation();
                const rect = buttonEl.getBoundingClientRect();
                dragState = {
                  id,
                  mode: event.target.dataset.resizeHandle ? 'resize' : 'drag',
                  pointerId: event.pointerId,
                  startClientX: event.clientX,
                  startClientY: event.clientY,
                  startX: b.x,
                  startY: b.y,
                  startWidth: b.width,
                  startHeight: b.height,
                  startScrollY: mainScrollY(),
                  startRenderedTop: rect.top,
                  moved: false
                };
                try { buttonEl.setPointerCapture(event.pointerId); } catch (_) {}
              }
          
              function onOverlayClick(event) {
                const buttonEl = event.target.closest('.tap-button');
                if (!buttonEl || state.editor.open) return;
                const b = getButtonData(buttonEl.dataset.buttonId);
                buttonAction(b);
              }
          
              function onPointerMove(event) {
                if (!dragState) return;
                event.preventDefault();
                const dx = event.clientX - dragState.startClientX;
                const dy = event.clientY - dragState.startClientY;
                if (Math.abs(dx) + Math.abs(dy) > 2) dragState.moved = true;
          
                if (dragState.kind === 'bottomOverlay') {
                  ensureBottomOverlayScreenY();
                  if (dragState.mode === 'overlay-resize') {
                    const nextWidthPx = Math.max(12, dragState.startPixelWidth + dx);
                    state.bottomOverlay.widthPct = safeNumber((nextWidthPx / Math.max(1, viewportWidth())) * 100, state.bottomOverlay.widthPct, 5, 400);
                    state.bottomOverlay.height = safeNumber(dragState.startHeight + dy, state.bottomOverlay.height, 1, 8000);
