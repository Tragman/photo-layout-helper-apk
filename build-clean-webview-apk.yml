              function safeNumber(value, fallback, min, max) {
                const n = Number(value);
                if (!Number.isFinite(n)) return fallback;
                return Math.max(min, Math.min(max, n));
              }
          
              function validHex(value, fallback = '#888888') {
                if (typeof value !== 'string') return fallback;
                let v = value.trim();
                if (!v) return fallback;
                if (v[0] !== '#') v = '#' + v;
                if (/^#[0-9a-fA-F]{3}$/.test(v)) {
                  v = '#' + v.slice(1).split('').map(ch => ch + ch).join('');
                }
                return /^#[0-9a-fA-F]{6}$/.test(v) ? v.toLowerCase() : fallback;
              }
          
              function validFit(value, fallback = 'cover') {
                return ['cover', 'contain', 'fill'].includes(value) ? value : fallback;
              }
          
              function viewportHeight() {
                return Math.max(320, Math.round(window.innerHeight || document.documentElement.clientHeight || 760));
              }
          
              function viewportWidth() {
                return Math.max(320, Math.round(window.innerWidth || document.documentElement.clientWidth || 390));
              }
          
              function mainScrollY() {
                return Math.max(0, Math.round((els.mainScroll && els.mainScroll.scrollTop) || 0));
              }
          
              function bottomOverlayCssTop() {
                return Math.round(ensureBottomOverlayScreenY());
              }
          
              function bottomOverlayCssLeft() {
                return Math.round(viewportWidth() / 2);
              }
          
              function bottomOverlayPixelWidth() {
                return Math.max(1, Math.round((viewportWidth() * state.bottomOverlay.widthPct) / 100));
              }
          
              function calculateOverlayScreenYFromBottomGap() {
                if (!state || !state.bottomOverlay) return 0;
                return Math.round(viewportHeight() - state.bottomOverlay.height - state.bottomOverlay.bottomGap);
              }
          
              function ensureBottomOverlayScreenY() {
                if (!state || !state.bottomOverlay) return 0;
                const y = Number(state.bottomOverlay.screenY);
                if (!Number.isFinite(y)) {
                  state.bottomOverlay.screenY = calculateOverlayScreenYFromBottomGap();
                }
                return state.bottomOverlay.screenY;
              }
          
              function syncBottomGapFromScreenY() {
                if (!state || !state.bottomOverlay) return;
                const gap = Math.round(viewportHeight() - ensureBottomOverlayScreenY() - state.bottomOverlay.height);
                state.bottomOverlay.bottomGap = safeNumber(gap, state.bottomOverlay.bottomGap, 0, 3000);
              }
          
              function cleanButton(raw, fallback) {
                const b = Object.assign({}, fallback, raw || {});
                b.text = typeof b.text === 'string' ? b.text : fallback.text;
                b.x = safeNumber(b.x, fallback.x, -5000, 5000);
                b.y = safeNumber(b.y, fallback.y, -5000, 200000);
                b.width = safeNumber(b.width, fallback.width, MIN_SIZE, 3000);
                b.height = safeNumber(b.height, fallback.height, MIN_SIZE, 3000);
                b.radius = safeNumber(b.radius, fallback.radius, 0, 999);
                b.color = validHex(b.color, fallback.color);
                b.transparent = !!b.transparent;
                b.locked = !!b.locked;
                b.action = fallback.action;
                return b;
              }
          
              function mergeState(saved) {
                const d = freshDefaults();
                if (!saved || typeof saved !== 'object') return d;
                const merged = freshDefaults();
                merged.mainImageIds = Array.isArray(saved.mainImageIds) ? saved.mainImageIds.filter(Boolean) : [];
                merged.photoImageId = saved.photoImageId || null;
                merged.galleryImageIds = Array.isArray(saved.galleryImageIds) ? saved.galleryImageIds.filter(Boolean) : [];
                merged.bottomOverlayImageId = saved.bottomOverlayImageId || null;
                merged.bottomOverlay = Object.assign({}, d.bottomOverlay, saved.bottomOverlay || {});
                merged.bottomOverlay.widthPct = safeNumber(merged.bottomOverlay.widthPct, d.bottomOverlay.widthPct, 5, 400);
                merged.bottomOverlay.height = safeNumber(merged.bottomOverlay.height, d.bottomOverlay.height, 1, 8000);
                merged.bottomOverlay.bottomGap = safeNumber(merged.bottomOverlay.bottomGap, d.bottomOverlay.bottomGap, 0, 3000);
                merged.bottomOverlay.screenY = Number.isFinite(Number(merged.bottomOverlay.screenY))
                  ? safeNumber(merged.bottomOverlay.screenY, d.bottomOverlay.screenY, -8000, 8000)
                  : null;
                merged.bottomOverlay.fit = validFit(merged.bottomOverlay.fit, d.bottomOverlay.fit);
                merged.bottomOverlay.topRadius = safeNumber(merged.bottomOverlay.topRadius, d.bottomOverlay.topRadius, 0, 500);
                merged.imageSizing = Object.assign({}, d.imageSizing, saved.imageSizing || {});
                merged.imageSizing.mainWidthPct = safeNumber(merged.imageSizing.mainWidthPct, d.imageSizing.mainWidthPct, 10, 400);
                merged.imageSizing.mainHeight = safeNumber(merged.imageSizing.mainHeight, d.imageSizing.mainHeight, 0, 8000);
                merged.imageSizing.mainFit = validFit(merged.imageSizing.mainFit, d.imageSizing.mainFit);
                merged.imageSizing.singleFit = validFit(merged.imageSizing.singleFit, d.imageSizing.singleFit);
                merged.imageSizing.galleryFit = validFit(merged.imageSizing.galleryFit, d.imageSizing.galleryFit);
                merged.buttons.button1 = cleanButton(saved.buttons && saved.buttons.button1, d.buttons.button1);
                merged.buttons.button2 = cleanButton(saved.buttons && saved.buttons.button2, d.buttons.button2);
                merged.buttons.account = cleanButton(saved.buttons && saved.buttons.account, d.buttons.account);
                const rawClones = saved.buttons && Array.isArray(saved.buttons.clones) ? saved.buttons.clones : [];
                merged.buttons.clones = rawClones.map((raw, i) => {
                  const fb = Object.assign({}, d.buttons.button2, { text: '', locked: true, action: 'gallery', x: 24 + i * 4, y: 280 + i * 4 });
                  return cleanButton(raw, fb);
                });
                merged.account.title = saved.account && typeof saved.account.title === 'string' ? saved.account.title : d.account.title;
                merged.account.email = saved.account && typeof saved.account.email === 'string' ? saved.account.email : d.account.email;
                merged.editor.open = false;
                merged.editor.collapsed = !!(saved.editor && saved.editor.collapsed);
                return merged;
              }
          
              function loadState() {
                try {
                  const raw = localStorage.getItem(LS_KEY);
                  return mergeState(raw ? JSON.parse(raw) : null);
                } catch (err) {
                  console.warn('Settings were unreadable, using defaults.', err);
                  return freshDefaults();
                }
              }
          
              function saveState() {
                try {
                  localStorage.setItem(LS_KEY, JSON.stringify(state));
                } catch (err) {
                  console.warn('Could not save settings.', err);
                }
              }
          
              function openDb() {
                return new Promise(resolve => {
                  if (!('indexedDB' in window)) {
                    console.warn('IndexedDB unavailable. Images will not persist.');
                    resolve(null);
                    return;
                  }
                  const req = indexedDB.open(DB_NAME, DB_VERSION);
                  req.onupgradeneeded = () => {
                    const database = req.result;
                    if (!database.objectStoreNames.contains(STORE)) database.createObjectStore(STORE);
                  };
                  req.onsuccess = () => resolve(req.result);
                  req.onerror = () => {
                    console.warn('IndexedDB failed to open.', req.error);
                    resolve(null);
                  };
                });
              }
          
              function txStore(mode = 'readonly') {
                if (!db) return null;
                try {
                  return db.transaction(STORE, mode).objectStore(STORE);
                } catch (err) {
                  console.warn('IndexedDB transaction failed.', err);
                  return null;
                }
              }
          
              function putImage(id, blob) {
                return new Promise(resolve => {
                  const store = txStore('readwrite');
                  if (!store) { resolve(false); return; }
                  const req = store.put(blob, id);
                  req.onsuccess = () => resolve(true);
                  req.onerror = () => { console.warn('Image save failed.', req.error); resolve(false); };
                });
              }
          
              function getImage(id) {
                return new Promise(resolve => {
                  if (!id) { resolve(null); return; }
                  const store = txStore('readonly');
                  if (!store) { resolve(null); return; }
                  const req = store.get(id);
                  req.onsuccess = () => resolve(req.result || null);
                  req.onerror = () => { console.warn('Image read failed.', req.error); resolve(null); };
                });
              }
          
              function deleteImage(id) {
                return new Promise(resolve => {
                  if (!id) { resolve(false); return; }
                  const store = txStore('readwrite');
                  if (!store) { resolve(false); return; }
                  const req = store.delete(id);
                  req.onsuccess = () => resolve(true);
                  req.onerror = () => { console.warn('Image delete failed.', req.error); resolve(false); };
                });
              }
          
              function clearImages() {
                return new Promise(resolve => {
                  const store = txStore('readwrite');
                  if (!store) { resolve(false); return; }
                  const req = store.clear();
                  req.onsuccess = () => resolve(true);
                  req.onerror = () => { console.warn('Image clear failed.', req.error); resolve(false); };
                });
              }
          
              function newImageId(prefix) {
                return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
              }
          
              function revokeUrls(listName) {
                if (Array.isArray(objectUrls[listName])) {
                  objectUrls[listName].forEach(url => URL.revokeObjectURL(url));
                  objectUrls[listName] = [];
                } else if (objectUrls[listName]) {
                  URL.revokeObjectURL(objectUrls[listName]);
                  objectUrls[listName] = null;
                }
              }
          
              async function filesToImageIds(files, prefix) {
                const ids = [];
                if (!files || !files.length) return ids;
                for (const file of Array.from(files)) {
                  if (!file || !file.type || !file.type.startsWith('image/')) continue;
                  const id = newImageId(prefix);
                  const ok = await putImage(id, file);
                  if (ok) ids.push(id);
                }
                return ids;
              }
          
              async function renderMainImages() {
                revokeUrls('main');
                els.mainCanvas.textContent = '';
                if (!state.mainImageIds.length) {
                  const placeholder = document.createElement('div');
                  placeholder.className = 'empty-main';
                  placeholder.textContent = 'Upload main page images';
                  els.mainCanvas.appendChild(placeholder);
                  return;
                }
                let count = 0;
                for (const id of state.mainImageIds) {
                  const blob = await getImage(id);
                  if (!blob) continue;
                  const url = URL.createObjectURL(blob);
                  objectUrls.main.push(url);
                  const img = document.createElement('img');
                  img.className = 'main-img';
                  img.alt = '';
                  img.style.width = `${state.imageSizing.mainWidthPct}%`;
                  img.style.height = state.imageSizing.mainHeight > 0 ? `${state.imageSizing.mainHeight}px` : 'auto';
                  img.style.objectFit = state.imageSizing.mainFit;
                  img.style.marginLeft = state.imageSizing.mainWidthPct < 100 ? 'auto' : '0';
                  img.style.marginRight = state.imageSizing.mainWidthPct < 100 ? 'auto' : '0';
                  img.src = url;
                  img.onerror = () => img.remove();
                  els.mainCanvas.appendChild(img);
                  count++;
                }
                if (!count) {
                  const placeholder = document.createElement('div');
                  placeholder.className = 'empty-main';
                  placeholder.textContent = 'Upload main page images';
                  els.mainCanvas.appendChild(placeholder);
                }
              }
          
              function setBottomOverlayElementBox(el) {
                if (!el) return;
                el.style.width = `${bottomOverlayPixelWidth()}px`;
                el.style.height = `${Math.round(state.bottomOverlay.height)}px`;
                el.style.left = `${bottomOverlayCssLeft()}px`;
                el.style.top = `${bottomOverlayCssTop()}px`;
                el.style.right = 'auto';
                el.style.bottom = 'auto';
                el.style.borderTopLeftRadius = `${state.bottomOverlay.topRadius}px`;
                el.style.borderTopRightRadius = `${state.bottomOverlay.topRadius}px`;
                el.style.transform = 'translate3d(-50%, 0, 0)';
              }
          
              function correctBottomOverlayDrift() {
                // The bottom overlay is outside the internal scroll container. Re-apply the
                // saved screen box only; do not use document scroll or visualViewport offsets.
                if (currentPage !== 'main' || !state.bottomOverlayImageId) return;
                if (els.bottomOverlay.classList.contains('visible')) setBottomOverlayElementBox(els.bottomOverlay);
                if (els.bottomOverlayEditFrame.classList.contains('visible')) setBottomOverlayElementBox(els.bottomOverlayEditFrame);
              }
          
              function renderBottomOverlayEditFrame() {
                const frame = els.bottomOverlayEditFrame;
                const img = els.bottomOverlay;
                if (!frame) return;
                const shouldShow = currentPage === 'main' && state.bottomOverlayImageId && img.classList.contains('visible');
                if (!shouldShow) {
                  frame.classList.remove('visible');
                  if (!img.classList.contains('visible')) els.bottomOverlayLayer.classList.remove('visible');
                  return;
                }
                els.bottomOverlayLayer.classList.add('visible');
                ensureBottomOverlayScreenY();
                setBottomOverlayElementBox(frame);
                frame.classList.add('visible');
              }
          
              async function renderBottomOverlay() {
                revokeUrls('bottom');
                const img = els.bottomOverlay;
                img.classList.remove('visible');
                els.bottomOverlayLayer.classList.remove('visible');
                img.removeAttribute('src');
                renderBottomOverlayEditFrame();
                if (!state.bottomOverlayImageId) return;
                const blob = await getImage(state.bottomOverlayImageId);
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                objectUrls.bottom = url;
                img.onload = renderBottomOverlayEditFrame;
                img.src = url;
                ensureBottomOverlayScreenY();
                img.style.objectFit = state.bottomOverlay.fit;
                setBottomOverlayElementBox(img);
                img.classList.add('visible');
                els.bottomOverlayLayer.classList.add('visible');
                renderBottomOverlayEditFrame();
                requestAnimationFrame(correctBottomOverlayDrift);
              }
          
              async function renderPhotoPage() {
                revokeUrls('photo');
                els.photoContent.textContent = '';
                const blob = await getImage(state.photoImageId);
                if (!blob) {
                  const placeholder = document.createElement('div');
                  placeholder.className = 'photo-placeholder';
                  placeholder.textContent = 'Upload a target photo for button one in Creative mode.';
                  els.photoContent.appendChild(placeholder);
                  return;
                }
                const url = URL.createObjectURL(blob);
                objectUrls.photo = url;
                const img = document.createElement('img');
                img.id = 'singlePhotoImg';
                img.alt = '';
                img.style.objectFit = state.imageSizing.singleFit;
                img.src = url;
                img.onerror = () => {
