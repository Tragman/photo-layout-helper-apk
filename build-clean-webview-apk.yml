      - name: Verify clean project before build
        shell: bash
        run: |
          set -euo pipefail
          echo "--- gradle.properties ---"
          cat gradle.properties
          echo "--- app/build.gradle ---"
          cat app/build.gradle
          if grep -R "androidx.webkit" -n build.gradle app/build.gradle settings.gradle gradle.properties; then
            echo "Found old androidx.webkit dependency. This is the wrong workflow file."
            exit 1
          fi

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhotoLayoutHelper-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
